<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Identity | Zeed</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-green: #00a86b;
            --dark-green: #1b4332;
            --light-green: #f4fbf7;
            --border-color: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--light-green);
            color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .wrapper {
            width: 100%;
            padding: 0 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-header {
            font-family: 'Great Vibes', cursive;
            color: var(--brand-green);
            font-size: 55px;
            text-align: center;
            margin-bottom: 25px;
        }

        /* Enforced Dimensions: 100% Device Width & 350px Height */
        .verification-card {
            width: 100%;
            height: 350px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 168, 107, 0.05);
            border: 1px solid #e1eee7;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .step-container {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .subheadline {
            text-align: center;
            font-size: 18px;
            color: var(--dark-green);
            margin: 0 0 25px 0;
            font-weight: 500;
        }

        .status-msg {
            font-size: 14px;
            color: #166534;
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 10px 14px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        input[type="email"] {
            width: 100%;
            padding: 22px 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: #f8fafc;
            font-size: 16px;
            font-family: inherit;
            color: #1e293b;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input[type="email"]:focus {
            outline: none;
            border-color: var(--brand-green);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 168, 107, 0.1);
        }

        /* 4-Box Configuration UI */
        .otp-inputs-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .otp-box {
            width: 55px;
            height: 55px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background-color: #f8fafc;
            color: #1e293b;
            transition: all 0.2s ease;
        }

        .otp-box:focus {
            outline: none;
            border-color: var(--brand-green);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(0, 168, 107, 0.1);
        }

        .btn-submit {
            background: var(--brand-green);
            color: #ffffff;
            padding: 24px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-submit:hover {
            background: var(--dark-green);
        }

        .resend-wrapper {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .resend-link {
            color: var(--brand-green);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .resend-link:hover {
            text-decoration: underline;
            color: var(--dark-green);
        }

        .hidden {
            display: none !important;
        }

        /* Dynamic Error Box Formatting */
        .status-msg.error-alert {
            background-color: #fef2f2;
            border-color: #fca5a5;
            color: #991b1b;
        }

        /* Subtle error shake animation */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        .shake-element {
            animation: shake 0.2s ease-in-out 0s 2;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="logo-header">zeed</div>

    <div class="verification-card">
        
        <div id="email-stage" class="step-container">
            <h2 class="subheadline">Enter your email here to verify</h2>
            <form id="email-form" method="POST" action="{% url 'verify_email' %}">
                {% csrf_token %}
                <div class="input-group">
                    <input type="email" id="user-email" name="email" placeholder="name@domain.com" required>
                </div>
                <button type="submit" class="btn-submit">Send Code</button>
            </form>
        </div>

        <div id="otp-stage" class="step-container hidden">
            <div class="status-msg">
                We've sent a verification code to your email.
            </div>
            
            <form id="otp-form" method="POST" action="signup.html">
                {% csrf_token %}
                <input type="hidden" id="context-email" name="email">
                <input type="hidden" id="complete-otp" name="otp">
                
                <div class="otp-inputs-grid">
                    <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric" autocomplete="one-time-code" required>
                    <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric" required>
                    <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric" required>
                    <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric" required>
                </div>

                <button type="submit" class="btn-submit">Verify Identity</button>
            </form>

            <div class="resend-wrapper">
                I didn't receive the OTP? <span class="resend-link" id="resend-trigger">Link-resend again</span>
            </div>
        </div>

    </div>
</div>

<script>
const emailForm = document.getElementById('email-form');
const otpForm = document.getElementById('otp-form');
const emailStage = document.getElementById('email-stage');
const otpStage = document.getElementById('otp-stage');
const contextEmail = document.getElementById('context-email');
const resendTrigger = document.getElementById('resend-trigger');
const otpBoxes = Array.from(document.querySelectorAll('.otp-box'));
const completeOtp = document.getElementById('complete-otp');
const statusBox = document.querySelector('.status-msg'); 

// Stage 1: Process initial email request
emailForm.addEventListener('submit', function(e) {
    e.preventDefault();
    const targetEmail = document.getElementById('user-email').value;
    if (!targetEmail) return;

    contextEmail.value = targetEmail;

    fetch(this.action, {
        method: 'POST',
        body: new FormData(this),
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    });

    emailStage.classList.add('hidden');
    otpStage.classList.remove('hidden');
    
    setTimeout(() => otpBoxes[0].focus(), 50);
});

// 4-Box Entry Navigation & Paste logic
otpBoxes.forEach((box, index) => {
    box.addEventListener('input', (e) => {
        const val = e.target.value;
        
        // Handle native paste command or autofills containing multiple characters
        if (val.length > 1) {
            const digits = val.replace(/\D/g, '').split('').slice(0, 4);
            otpBoxes.forEach((b, i) => b.value = digits[i] || '');
            const targetIndex = Math.min(digits.length, 3);
            otpBoxes[targetIndex].focus();
            return;
        }

        // Clean value validation (Allow numeric only)
        if (val && !/^[0-9]$/.test(val)) {
            box.value = '';
            return;
        }

        // Forward progression movement
        if (val && index < 3) {
            otpBoxes[index + 1].focus();
        }
    });

    box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace') {
            if (!box.value && index > 0) {
                // If box is already empty, move backward and clear previous box
                otpBoxes[index - 1].value = '';
                otpBoxes[index - 1].focus();
                e.preventDefault();
            }
        } else if (e.key === 'ArrowLeft' && index > 0) {
            otpBoxes[index - 1].focus();
        } else if (e.key === 'ArrowRight' && index < 3) {
            otpBoxes[index + 1].focus();
        }
    });

    // Handle standard paste events explicitly
    box.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasteData = (e.clipboardData || window.clipboardData).getData('text');
        const digits = pasteData.replace(/\D/g, '').split('').slice(0, 4);
        
        otpBoxes.forEach((b, i) => b.value = digits[i] || '');
        const targetFocus = digits.length >= 4 ? 3 : digits.length;
        otpBoxes[Math.min(targetFocus, 3)].focus();
    });
});

// Stage 2: Handled Submission with Graceful Error UI Transitions
otpForm.addEventListener('submit', function(e) {
    e.preventDefault();
    
    let combinedToken = "";
    otpBoxes.forEach(box => combinedToken += box.value);
    completeOtp.value = combinedToken;

    const formData = new FormData(this);
    formData.append('email', contextEmail.value);

    fetch("{% url 'verify_email' %}", {
        method: 'POST',
        body: formData,
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            window.location.href = "{% url 'signup' %}";
        } else {
            statusBox.textContent = data.message || "Invalid validation code.";
            statusBox.classList.add('error-alert');
            
            const containerGrid = document.querySelector('.otp-inputs-grid');
            containerGrid.classList.add('shake-element');
            
            otpBoxes.forEach(box => box.value = "");
            otpBoxes[0].focus();
            
            setTimeout(() => {
                containerGrid.classList.remove('shake-element');
            }, 400);
        }
    })
    .catch(() => {
        statusBox.textContent = "Connection issue. Please try again.";
        statusBox.classList.add('error-alert');
    });
});

// Resend Trigger Handler Logic
resendTrigger.addEventListener('click', function() {
    const payload = new FormData();
    payload.append('email', contextEmail.value);
    payload.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

    const originalText = this.innerText;
    this.innerText = "Sending...";
    
    fetch("{% url 'verify_email' %}", {
        method: 'POST',
        body: payload,
        headers: { 'X-Requested-With': 'XMLHttpRequest' }
    }).then(response => response.json())
    .then(data => {
        this.innerText = originalText;
        if (data.status === 'success') {
            statusBox.textContent = "A fresh verification code has been sent.";
            statusBox.classList.remove('error-alert');
        } else {
            statusBox.textContent = data.message || "Failed to resend code.";
            statusBox.classList.add('error-alert');
        }
    }).catch(() => {
        this.innerText = originalText;
        statusBox.textContent = "Connection issue. Please try again.";
        statusBox.classList.add('error-alert');
    });
}); 
</script>

</body>
</html>
