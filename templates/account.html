<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | Zeed</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Updated Background: White at top, fading to transparent blue at bottom */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh;
            width: 100%;
            background: linear-gradient(to bottom, #ffffff 70%, rgba(0, 0, 255, 0.2) 100%);
            background-attachment: fixed;
        }

        /* Header */
        .header { width: 100%; padding: 40px 20px; text-align: center; }
        .logo-headline { font-family: 'Great Vibes', cursive; font-size: 80px; color: green; line-height: 1; }

        /* Main Section */
        .content-wrapper { width: 90%; max-width: 800px; margin: 40px auto; padding: 30px; background: rgba(255, 255, 255, 0.8); border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #333; margin-bottom: 25px; border-bottom: 2px solid green; display: inline-block; padding-bottom: 5px; }

        .info-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; }
        .label { font-weight: 600; color: #666; }
        .value { color: #222; font-size: 1.1em; }

        /* Danger Zone */
        .danger-zone { margin-top: 50px; padding: 20px; border: 1px solid #ffcccc; border-radius: 8px; background: rgba(255, 245, 245, 0.5); }
        .danger-zone h3 { color: #d9534f; margin-bottom: 10px; }
        .delete-btn { background-color: #d9534f; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .delete-btn:hover { background-color: #c9302c; }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="logo-headline">Zeed</h1>
    </header>

    <main class="content-wrapper">
        <h2>My Account</h2>

        <div class="info-row">
            <span class="label">Username</span>
            <span class="value">{{ user.username }}</span>
        </div>
        <div class="info-row">
            <span class="label">Email</span>
            <span class="value">{{ user.email }}</span>
        </div>
        <div class="info-row">
            <span class="label">Date Joined</span>
            <span class="value">{{ user.date_joined|date:"F d, Y" }}</span>
        </div>

        <div class="danger-zone">
            <h3>Danger Zone</h3>
            <p style="margin-bottom: 15px; color: #666;">Once you delete your account, there is no going back. Please be certain.</p>
            
            <form id="deleteForm" method="POST" action="{% url 'delete_account' %}">
                {% csrf_token %}
                <button type="button" class="delete-btn" onclick="confirmDelete()">Delete My Account</button>
            </form>
        </div>
    </main>

    <script>
        function confirmDelete() {
            if (confirm("Are you sure you want to delete your account? This action cannot be undone.")) {
                document.getElementById("deleteForm").submit();
            }
        }
    </script>
</body>
</html>
