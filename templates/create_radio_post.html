<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Radio Post | Live Broadcast Room</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-danger: #ef4444;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 24px;
            border-bottom: 1px solid #334155;
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-light);
        }

        input[type="text"], .music-select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }
        
        input[type="text"]:focus {
            border-color: var(--accent-primary);
        }

        .char-counter {
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Live Stage Styling */
        .live-stage {
            background: #0f172a;
            border: 2px dashed #334155;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
        }

        .mic-btn {
            background: var(--accent-primary);
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .mic-btn.recording {
            background: var(--accent-danger);
            animation: pulse 1.5s infinite;
        }

        .mic-btn svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .status-text {
            margin-top: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* Speaker Panel */
        .speakers-section {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .speakers-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .speaker-count {
            background: var(--accent-primary);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.85rem;
        }

        .speaker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }

        .speaker-card {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.9rem;
            position: relative;
        }

        .speaker-card.host {
            border-color: var(--accent-success);
        }

        .speaker-badge {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 6px;
            background: #334155;
            border-radius: 4px;
            margin-top: 4px;
        }

        /* Action Buttons */
        .btn-invite {
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-invite:hover {
            background: var(--accent-primary);
            color: white;
        }

        .btn-submit {
            background: var(--accent-success);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover:not(:disabled) {
            background: #0ea5e9;
        }
        
        .btn-submit:disabled {
            background: #475569;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .audio-preview {
            width: 100%;
            margin-top: 12px;
            display: none;
        }

        /* Invite Modal Base Layer */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1e293b;
            border: 1px solid #334155;
            width: 90%;
            max-width: 450px;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .close-modal {
            background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer;
        }
        
        /* Search Results Styles */
        .search-results-list {
            margin-top: 16px;
            max-height: 250px;
            overflow-y: auto;
        }
        
        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #334155;
        }
        
        .user-info { display: flex; align-items: center; gap: 12px; }
        
        .user-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background: #334155; object-fit: cover;
        }
        
        .btn-send-tick {
            background: var(--accent-success); border: none; color: white;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold;
        }
        
        .btn-send-tick:hover { background: #059669; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Create Live Radio Post</h1>

    <form id="radioPostForm" action="{% url 'save_radio_post' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <!-- Hidden payload input holding audio blob -->
        <input type="file" id="finalAudioOutput" name="audio_file" style="display: none;">

        <!-- 1. Topic Section -->
        <div class="form-group">
            <label for="topicName">Broadcast Topic Name</label>
            <input type="text" id="topicName" name="topic_name" maxlength="250" placeholder="What are you discussing live right now?" required>
            <div class="char-counter"><span id="charCount">0</span> / 250</div>
        </div>

        <!-- 2. Interactive Audio Stage Block -->
        <div class="form-group">
            <label>Live Interaction Studio</label>
            <div class="live-stage">
                <button type="button" id="micButton" class="mic-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/>
                    </svg>
                </button>
                <div class="status-text" id="studioStatus">Tap microphone to start live stream & record</div>
                <audio id="playbackPreview" class="audio-preview" controls></audio>
            </div>
        </div>

        <!-- 3. Dynamic Multi-User Guest Panel (Limit 5 Speakers) -->
        <div class="speakers-section">
            <div class="speakers-header">
                <label style="margin: 0;">Live Co-Speakers Panel</label>
                <div>
                    <span class="speaker-count" id="speakerCount">1 / 6 Active</span>
                    <button type="button" class="btn-invite" id="inviteBtn">+ Invite Speaker</button>
                </div>
            </div>
            <div class="speaker-grid" id="speakerGrid">
                <div class="speaker-card host">
                    <strong>You</strong>
                    <div class="speaker-badge" style="background-color: var(--accent-success)">Host</div>
                </div>
            </div>
        </div>

        <!-- 4. Background Ambient Audio Settings Layer -->
        <div class="form-group">
            <label for="bgMusic">Soft Background Music Track</label>
            <input type="file" id="bgMusic" class="music-select" accept="audio/*">
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 6px;">
                * System automatically mixes this track very low and softly beneath human voices.
            </p>
        </div>

        <!-- Action Processing Call -->
        <button type="submit" class="btn-submit" id="submitBtn" disabled>Process & Finish Post</button>
    </form>
</div>

<!-- Search & Invitation Overlay System Module -->
<div class="modal-overlay" id="inviteModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="margin: 0;">Invite Live Co-Speaker</h3>
            <button type="button" class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <input type="text" id="userSearchInput" placeholder="Type username or name...">
        <div class="search-results-list" id="searchResults">
            <!-- Dynamic dynamic lookup rows load here -->
        </div>
    </div>
</div>

<script>
    // System UI Tracking Elements
    const topicNameInput = document.getElementById('topicName');
    const charCount = document.getElementById('charCount');
    const micButton = document.getElementById('micButton');
    const studioStatus = document.getElementById('studioStatus');
    const inviteBtn = document.getElementById('inviteBtn');
    const speakerGrid = document.getElementById('speakerGrid');
    const speakerCountText = document.getElementById('speakerCount');
    const bgMusicInput = document.getElementById('bgMusic');
    const submitBtn = document.getElementById('submitBtn');
    const playbackPreview = document.getElementById('playbackPreview');

    const inviteModal = document.getElementById('inviteModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const userSearchInput = document.getElementById('userSearchInput');
    const searchResults = document.getElementById('searchResults');

    let maxGuests = 5;
    let currentSpeakers = 1; 

    // Character Counter Mechanics
    topicNameInput.addEventListener('input', () => {
        charCount.textContent = topicNameInput.value.length;
    });

    // Open Invite Lookup Modal
    inviteBtn.addEventListener('click', () => {
        if (currentSpeakers >= (maxGuests + 1)) {
            alert('Maximum speaker threshold reached. You can only invite up to 5 people simultaneously.');
            return;
        }
        inviteModal.style.display = 'flex';
        userSearchInput.value = '';
        searchResults.innerHTML = '<p style="color: var(--text-muted); font-size:0.9rem;">Type to query application users...</p>';
        userSearchInput.focus();
    });

    // Close Modal Viewports
    closeModalBtn.addEventListener('click', () => inviteModal.style.display = 'none');
    window.addEventListener('click', (e) => { if(e.target === inviteModal) inviteModal.style.display = 'none'; });

    // AJAX User Query Filter Execution
    userSearchInput.addEventListener('input', () => {
        const query = userSearchInput.value.trim();
        if(query.length < 2) {
            searchResults.innerHTML = '';
            return;
        }

        fetch(`/search-users/?q=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(users => {
                searchResults.innerHTML = '';
                if(users.length === 0) {
                    searchResults.innerHTML = '<p style="color: var(--text-muted); font-size:0.9rem;">No profiles matched your criteria.</p>';
                    return;
                }
                users.forEach(user => {
                    const row = document.createElement('div');
                    row.className = 'user-row';
                    row.innerHTML = `
                        <div class="user-info">
                            <img src="${user.profile_image || 'https://via.placeholder.com/40'}" class="user-avatar" alt="Avatar">
                            <div>
                                <div style="font-weight:600;">${user.username}</div>
                                <div style="font-size:0.8rem; color:var(--text-muted);">${user.full_name}</div>
                            </div>
                        </div>
                        <button type="button" class="btn-send-tick" onclick="dispatchInvitation('${user.id}', '${user.username}')">✔ Send</button>
                    `;
                    searchResults.appendChild(row);
                });
            }).catch(err => console.error("Error executing directory lookup:", err));
    });

    // Fire Live Signaling Invitation Request Node
    window.dispatchInvitation = function(userId, username) {
        // Construct array body matching active stream target values
        const payload = { guest_id: userId, topic_context: topicNameInput.value || "Live Broadcast" };
        
        fetch('/send-live-invitation/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
            },
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                alert(`Successfully sent invitations to ${username}!`);
                inviteModal.style.display = 'none';
                
                // Provisionally append recipient onto room stage mapping
                currentSpeakers++;
                speakerCountText.textContent = `${currentSpeakers} / 6 Active`;
                
                const guestCard = document.createElement('div');
                guestCard.className = 'speaker-card';
                guestCard.id = `guest-${userId}`;
                guestCard.innerHTML = `
                    <strong>${username}</strong>
                    <div class="speaker-badge" style="background:#64748b;">Pending...</div>
                `;
                speakerGrid.appendChild(guestCard);

                if (currentSpeakers === (maxGuests + 1)) {
                    inviteBtn.style.opacity = '0.5';
                    inviteBtn.innerText = 'Room Full';
                }
            } else {
                alert(data.message || "Invitation transmission failure.");
            }
        }).catch(err => console.error("Communication error payload:", err));
    };

    // Advanced Web Audio API Node Mixer & Recording Pipeline Integration
    let mediaRecorder;
    let voiceAudioChunks = [];
    let isRecording = false;
    let voiceBlob;

    micButton.addEventListener('click', async () => {
        if (!isRecording) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                voiceAudioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) voiceAudioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    voiceBlob = new Blob(voiceAudioChunks, { type: 'audio/mp3' });
                    studioStatus.textContent = "Processing mixed ambient tracking channels...";
                    await mixAudioTracks();
                };

                mediaRecorder.start();
                isRecording = true;
                micButton.classList.add('recording');
                studioStatus.textContent = "🔴 Broadcasting Live... Speak into your microphone.";
            } catch (err) {
                console.error("Access permissions rejected for capture devices", err);
                alert("Microphone hardware access required for recording broadcasts.");
            }
        } else {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            isRecording = false;
            micButton.classList.remove('recording');
        }
    });

    // Multi-track Headless Web Audio Processor Core Mixer
    async function mixAudioTracks() {
        if (!bgMusicInput.files.length) {
            finalizeFormSubmissionFile(voiceBlob);
            return;
        }

        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const voiceBuffer = await audioCtx.decodeAudioData(await voiceBlob.arrayBuffer());
            const musicFile = bgMusicInput.files[0];
            const musicBuffer = await audioCtx.decodeAudioData(await musicFile.arrayBuffer());

            const duration = Math.max(voiceBuffer.duration, musicBuffer.duration);
            const offlineCtx = new OfflineAudioContext(2, audioCtx.sampleRate * duration, audioCtx.sampleRate);

            const voiceSource = offlineCtx.createBufferSource();
            voiceSource.buffer = voiceBuffer;

            const musicSource = offlineCtx.createBufferSource();
            musicSource.buffer = musicBuffer;

            const musicGain = offlineCtx.createGain();
            musicGain.gain.setValueAtTime(0.08, 0); // Sets volume to 8% (very low and soft)

            voiceSource.connect(offlineCtx.destination);
            musicSource.connect(musicGain);
            musicGain.connect(offlineCtx.destination);

            voiceSource.start(0);
            musicSource.start(0);

            const renderedBuffer = await offlineCtx.startRendering();
            const wavBlob = bufferToWav(renderedBuffer);
            finalizeFormSubmissionFile(wavBlob);

        } catch (error) {
            console.error("Audio mixing operation aborted unexpectedly:", error);
            finalizeFormSubmissionFile(voiceBlob);
        }
    }

    function finalizeFormSubmissionFile(blobData) {
        const file = new File([blobData], "completed_broadcast.wav", { type: "audio/wav" });
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);
        document.getElementById('finalAudioOutput').files = dataTransfer.files;

        playbackPreview.src = URL.createObjectURL(blobData);
        playbackPreview.style.display = 'block';
        
        studioStatus.textContent = "✅ Mix Completed successfully! Ready to Publish.";
        submitBtn.disabled = false;
    }

    // Binary Block Wav Conversion Subsystem
    function bufferToWav(buffer) {
        let numOfChan = buffer.numberOfChannels,
            length = buffer.length * numOfChan * 2 + 44,
            bufferArr = new ArrayBuffer(length),
            view = new DataView(bufferArr),
            channels = [], i, sample, offset = 0, pos = 0;

        function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
        function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

        setUint32(0x46464952); setUint32(length - 8); setUint32(0x45564157);
        setUint32(0x20746d66); setUint32(16); setUint16(1); setUint16(numOfChan);
        setUint32(buffer.sampleRate); setUint32(buffer.sampleRate * 2 * numOfChan);
        setUint16(numOfChan * 2); setUint16(16); setUint32(0x61746164);
        setUint32(length - pos - 4);

        for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

        while (pos < length) {
            for (i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][offset]));
                sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(pos, sample, true); pos += 2;
            }
            offset++;
        }
        return new Blob([bufferArr], { type: 'audio/wav' });
    }
</script>
</body>
</html>
