{% load static %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Zeed</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Gill+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: "Gill Sans", sans-serif;
            /* Ultra-clean transparency green background gradient */
            background: linear-gradient(180deg, 
                rgba(255,255,255,1) 0%, 
                rgba(244,247,247,1) 40%, 
                rgba(34, 197, 94, 0.15) 75%, 
                rgba(21, 128, 61, 0.3) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Clean UI Glassmorphism Container */
        .hero-container {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: 32px;
            width: 90%; 
            max-width: 650px; 
            text-align: center;
            box-shadow: 0 20px 40px -15px rgba(21, 128, 61, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: floatIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-container:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 30px 50px -15px rgba(21, 128, 61, 0.15);
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 96px;
            font-weight: 400;
            color: #00a86b;
            margin: 0;
            line-height: 1;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.02);
            display: inline-block;
        }

        h2 {
            font-size: 20px;
            font-weight: 400;
            color: #1e293b;
            margin-top: 25px;
            margin-bottom: 35px;
            max-width: 85%;
            line-height: 1.5;
            letter-spacing: 0.3px;
        }

        h2 em {
            font-style: normal;
            font-weight: 600;
            color: #115e59;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 130px;
            height: 130px;
            background: #ffffff;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 168, 107, 0.08);
            border: 3px solid #ffffff;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Subtle indicator showing action state */
        .redirect-loader {
            margin-top: 30px;
            width: 120px;
            height: 4px;
            background: rgba(0, 168, 107, 0.1);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .redirect-loader::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: #00a86b;
            border-radius: 2px;
            /* Matches the 2-second JavaScript transition time exactly */
            animation: loadingBar 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes loadingBar {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 76px; }
            h2 { font-size: 17px; max-width: 100%; }
            .logo-container { width: 110px; height: 110px; }
            .hero-container { padding: 40px 24px; }
        }
    </style>
</head>
<body>

<!-- Absolute layout routing directed securely into the initial verification template path -->
<a href="{% url 'login' %}" class="hero-container">
    <h1>Zeed</h1>
    <h2>Expand skills, get notified and be entertained with your <em>listening networks</em></h2>

    <div class="logo-container">
        <img src="{% static 'mylogo.png' %}" alt="zeed Logo">
    </div>

    <div class="redirect-loader"></div>
</a>

<script>
    // System automatically transfers execution flow straight down to email_verify interface module after 2 seconds
    setTimeout(function(){
        window.location.href = "{% url 'login' %}";
    }, 2000); 
</script>

</body>
</html>
