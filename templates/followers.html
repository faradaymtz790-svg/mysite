<div style="max-width: 600px; margin: 20px auto; font-family: 'Inter', sans-serif; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #f0f0f0;">
    
    <h2 style="color: #00a86b; text-transform: uppercase; border-bottom: 2px solid #e6f7ef; padding-bottom: 15px; font-size: 20px; letter-spacing: 1px;">
        {{ profile_user.username|upper }}'S FOLLOWERS
    </h2>

    {% for f in followers %}
    <div style="display: flex; align-items: center; justify-content: space-between; padding: 18px 0; border-bottom: 1px solid #f9f9f9;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="{% if f.follower.profile.image %}{{ f.follower.profile.image.url }}{% else %}https://via.placeholder.com/45{% endif %}" 
                 style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #e6f7ef;">
            
            <div>
                <b style="text-transform: uppercase; color: #1a1a1a; display: block; font-size: 15px;">
                    {{ f.follower.username|upper }}
                </b>
            </div>
        </div>

        <a href="{% url 'profile' f.follower.username %}" 
           style="background: #00a86b; color: white; text-decoration: none; font-weight: 700; font-size: 12px; padding: 8px 18px; border-radius: 20px; transition: 0.3s;"
           onmouseover="this.style.opacity='0.8'"
           onmouseout="this.style.opacity='1'">
            VIEW PROFILE
        </a>
    </div>
    {% empty %}
    <div style="text-align: center; padding: 40px 0;">
        <p style="color: #999; text-transform: uppercase; font-size: 13px; letter-spacing: 1px;">No followers yet</p>
    </div>
    {% endfor %}

    <div style="margin-top: 25px; text-align: center;">
        <a href="javascript:history.back()" style="color: #888; text-decoration: none; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px;">
            ← GO BACK
        </a>
    </div>
</div>
