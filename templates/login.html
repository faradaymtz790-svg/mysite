<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | plugbar</title>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Gill+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #2563eb;
            --hover-blue: #1d4ed8;
            --glass-white: rgba(255, 255, 255, 0.85);
            --border-blue: #3b82f6;
            --text-dark: #1e293b;
        }

        * {
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif;
            background: linear-gradient(180deg, 
                rgba(255,255,255,1) 0%, 
                rgba(248,250,252,1) 30%, 
                rgba(34, 197, 94, 0.4) 50%, 
                rgba(21, 128, 61, 0.7) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-container {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 20px;
            border-radius: 30px;
            width: 100vw; 
            max-width: 800px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: floatIn 0.9s ease-out;
            margin: 20px;
        }

        .logo-main {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 10px;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 70px;
            font-weight: 400;
            color: #06ac2d;
            margin: 0;
            text-transform: capitalize;
            line-height: 0.9;
            transform: rotate(-2deg);
        }

        h2 {
            font-size: 22px;
            font-weight: 700;
            color: #144890;
            margin-bottom: 40px;
            margin-top: 15px;
        }

        .form-group {
            width: 100%;
            margin-bottom: 30px; /* Enhanced separation for minimalist lines */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Modern Bottom Line Styling */
        input {
            width: 90% !important; /* Updated to 90% */
            padding: 14px 10px !important; 
            border-radius: 0px !important; /* Removed rounded edges */
            border: none !important;
            border-bottom: 2px solid var(--border-blue) !important; /* Pure bottom line design */
            background: transparent !important; /* Transparent for seamless look */
            font-size: 16px;
            color: var(--text-dark);
            outline: none;
        }

        input:focus {
            transform: translateY(-2px); /* Sleek vertical floating animation */
            box-shadow: none !important; /* Removed heavy boxes for clean look */
            border-bottom-color: var(--hover-blue) !important;
        }

        .password-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .toggle-password {
            position: absolute;
            right: 8%; /* Balanced relative positioning for 90% input width */
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 20px;
            z-index: 10;
        }

        button {
            width: 90%; /* Synchronized button width with fields */
            padding: 20px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, var(--primary-blue), #1e40af);
            color: white;
            font-size: 18px;
            font-weight: 700;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
        }

        button:hover {
            transform: translateY(-4px);
            filter: brightness(1.1);
            box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.5);
        }

        .signup-link {
            margin-top: 30px;
            font-size: 15px;
            color: #475569;
        }

        .signup-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 700;
        }

        .error {
            color: #e11d48;
            background: #fff1f2;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
            width: 90%;
            margin: 0 auto 15px;
            display: none;
            border: 1px solid #fda4af;
        }
    </style>
</head>

<body>

<div class="login-container">
    <img src="/static/mylogo.png" class="logo-main" alt="Logo">
    <h1>plugbar</h1>
    <h2>Login Now</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="error" style="display: block;">{{ message }}</div>
        {% endfor %}
    {% endif %}
    
    <div class="error" id="errorMsg">Please fill all fields correctly</div>

    <form method="POST" id="loginForm" onsubmit="return validateForm()">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
        
        <input type="hidden" name="form_load_time" id="form_load_time">

        <div style="opacity: 0; position: absolute; top: 0; left: 0; height: 0; width: 0; z-index: -1; overflow: hidden;">
            <input type="text" name="company_name_extra" tabindex="-1" autocomplete="off">
        </div>

        <div class="form-group">
            <input type="text" id="username" name="username" placeholder="Username or Email" required>
        </div>

        <div class="form-group">
            <div class="password-wrapper">
                <input type="password" id="password" name="password" placeholder="Password" required>
                <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>
        </div>

        <button type="submit">Login</button>
    </form>

    <div class="signup-link">
        <p>I don't have an account? <a href="{% url 'signup' %}">Create one</a></p>
    </div>
</div>

<script>
    // Record the time the page loaded (Unix Timestamp)
    document.getElementById('form_load_time').value = Math.floor(Date.now() / 1000);

    function togglePassword() {
        const password = document.getElementById('password');
        const icon = document.querySelector('.toggle-password');
        if (password.type === 'password') {
            password.type = 'text';
            icon.textContent = '🙈';
        } else {
            password.type = 'password';
            icon.textContent = '👁';
        }
    }

    function validateForm() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('errorMsg');

        if (username === '' || password === '') {
            errorMsg.textContent = 'Please fill all fields correctly';
            errorMsg.style.display = 'block';
            return false;
        }

        // Quick check: If submission is under 2 seconds, it's likely a bot
        const loadTime = document.getElementById('form_load_time').value;
        const now = Math.floor(Date.now() / 1000);
        if (now - loadTime < 2) {
            // We don't alert the bot, just let the server handle it
            return true; 
        }

        errorMsg.style.display = 'none';
        return true;
    }
</script>

</body>
</html>
