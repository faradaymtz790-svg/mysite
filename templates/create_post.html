<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
<meta charset="UTF-8">
<title>Create Post</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(rgba(0,128,0,0.5), rgba(255,255,255,0.5));
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        width: 90%;
        max-width: 500px;
        padding: 20px;
        border-radius: 20px;
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        animation: fadeIn 0.7s ease;
    }

    h2 {
        text-align: center;
        color: green;
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        border-radius: 15px;
        border: 1px solid green;
        resize: none;
        outline: none;
        margin-bottom: 10px;
    }

    .counter {
        text-align: right;
        font-size: 12px;
        color: green;
        margin-bottom: 10px;
    }

    .upload-section {
        display: flex;
        justify-content: space-between;
        margin: 15px 0;
    }

    .icon-box {
        flex: 1;
        margin: 5px;
        padding: 15px;
        border-radius: 15px;
        border: 1px solid green;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        color: green;
    }

    .icon-box:hover {
        background: green;
        color: white;
        transform: scale(1.05);
    }

    .file-status {
        font-size: 11px;
        color: #555;
        text-align: center;
        margin-top: -5px;
        margin-bottom: 10px;
        display: none; 
    }

    input[type="file"] {
        display: none;
    }

    button {
        width: 100%;
        padding: 12px;
        border-radius: 20px;
        border: none;
        background: green;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: darkgreen;
        transform: scale(1.05);
    }

    .error-msg {
        color: red;
        text-align: center;
        font-size: 14px;
        margin-bottom: 10px;
    }

    @keyframes fadeIn {
        from {opacity:0; transform: translateY(20px);} 
        to {opacity:1; transform: translateY(0);} 
    }
</style>
</head>
<body>

<div class="container">
    <h2>Create a Post Now</h2>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form id="postForm" action="{% url 'create_post' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <textarea id="title" name="title" placeholder="Write your post (max 350 words)" required></textarea>
        <div class="counter" id="counter">0 / 350</div>

        <!-- AUDIO SECTION -->
        <div class="upload-section">
            <div class="icon-box" onclick="document.getElementById('audioInput').click()">
                📁 Select Audio
            </div>
            <div class="icon-box" id="recordBtn" onclick="startRecording()">
                🎤 Record Voice
            </div>
        </div>
        <div id="audioStatus" class="file-status"></div>
        <input type="file" id="audioInput" name="audio" accept="audio/*">

        <!-- IMAGE SECTION -->
        <div class="upload-section">
            <div class="icon-box" onclick="document.getElementById('imageInput').click()">
                🖼 Select audio story cover
            </div>
        </div>
        <div id="imageStatus" class="file-status"></div>
        <!-- REMOVED 'required' to prevent silent browser blocking -->
        <input type="file" id="imageInput" name="image" accept="image/*" required>

        <button type="submit" id="submitBtn">Post</button>
    </form>
</div>

<script>
    const textarea = document.getElementById('title');
    const counter = document.getElementById('counter');
    const audioInput = document.getElementById('audioInput');
    const imageInput = document.getElementById('imageInput');
    const postForm = document.getElementById('postForm');

    // Word counter logic
    textarea.addEventListener('input', () => {
        const words = textarea.value.trim().split(/\s+/).filter(w => w.length > 0);
        if (words.length > 350) {
            const trimmed = textarea.value.split(/\s+/).slice(0, 350).join(' ');
            textarea.value = trimmed;
        }
        counter.textContent = words.length + " / 350";
    });

    // Visual feedback
    audioInput.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            const status = document.getElementById('audioStatus');
            status.style.display = 'block';
            status.textContent = "✅ Audio: " + this.files[0].name;
        }
    });

    imageInput.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            const status = document.getElementById('imageStatus');
            status.style.display = 'block';
            status.textContent = "✅ Image: " + this.files[0].name;
        }
    });

    // Voice Recording logic
    let mediaRecorder;
    let audioChunks = [];

    function startRecording() {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start();
                audioChunks = [];
                
                const recordBtn = document.getElementById('recordBtn');
                recordBtn.textContent = "🔴 Recording...";
                recordBtn.style.background = "red";
                recordBtn.style.color = "white";

                mediaRecorder.ondataavailable = e => {
                    audioChunks.push(e.data);
                };

                setTimeout(() => {
                    mediaRecorder.stop();
                    stream.getTracks().forEach(track => track.stop());
                }, 5000); 

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mpeg' });
                    const file = new File([audioBlob], "recorded_audio.mp3", {type: 'audio/mpeg'});

                    const container = new DataTransfer();
                    container.items.add(file);
                    audioInput.files = container.files;

                    recordBtn.textContent = "🎤 Record Voice";
                    recordBtn.style.background = "transparent";
                    recordBtn.style.color = "green";

                    const status = document.getElementById('audioStatus');
                    status.style.display = 'block';
                    status.textContent = "✅ Voice recorded successfully (5s)";
                };
            })
            .catch(() => alert('Microphone access denied or not supported.'));
    }

    // FINAL VALIDATION - Stops silent failures
    postForm.addEventListener('submit', function(e) {
        const titleVal = textarea.value.trim();
        const hasImage = imageInput.files && imageInput.files.length > 0;

        if (!titleVal) {
            e.preventDefault();
            alert("Please write something in the post field.");
            return;
        }

        if (!hasImage) {
            e.preventDefault();
            alert("Please select an image cover. This is required.");
            return;
        }

        // Change button text to show it is working
        document.getElementById('submitBtn').textContent = "Uploading... Please wait";
        document.getElementById('submitBtn').style.opacity = "0.5";
    });
</script>

</body>
</html>
