<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post | plugbar</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,128,0,0.5), rgba(255,255,255,0.5));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 500px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        h2 { text-align: center; color: #2d5a27; margin-top: 0; }

        textarea {
            width: 100%; height: 120px; padding: 12px;
            border-radius: 15px; border: 2px solid #a8cba4;
            resize: none; outline: none; font-size: 16px;
            box-sizing: border-box;
        }

        .counter { text-align: right; font-size: 12px; color: green; margin-top: 5px; }

        .upload-section { display: flex; gap: 10px; margin: 15px 0; }

        .icon-box {
            flex: 1; padding: 15px 10px; border-radius: 12px;
            border: 2px dashed green; text-align: center;
            cursor: pointer; color: green; font-weight: bold;
            background: rgba(255,255,255,0.5); transition: 0.3s;
        }

        .icon-box:hover { background: green; color: white; }

        /* Recording Pulse Effect */
        .recording-active {
            background: #c62828 !important;
            color: white !important;
            border-style: solid !important;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .file-status {
            font-size: 13px; color: #2d5a27; text-align: center;
            margin: 10px 0; display: none; padding: 8px;
            background: #e8f5e9; border-radius: 8px;
        }

        input[type="file"] { display: none; }

        #submitBtn {
            width: 100%; padding: 15px; border-radius: 25px;
            border: none; background: green; color: white;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }

        #submitBtn:disabled { background: #a8cba4; cursor: not-allowed; }

        .error-msg {
            background: #ffebee; color: #c62828;
            padding: 10px; border-radius: 10px; margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Create Post</h2>

    <div id="jsError" class="error-msg" style="display:none;"></div>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form id="postForm" method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <textarea id="title" name="title" placeholder="Describe your story..." required></textarea>
        <div class="counter" id="counter">0 / 350 words</div>

        <div class="upload-section">
            <div class="icon-box" onclick="document.getElementById('audioInput').click()">📁 Select Audio</div>
            <div class="icon-box" id="recordBtn" onclick="toggleRecording()">🎤 Record Voice</div>
        </div>
        <div id="audioStatus" class="file-status"></div>
        <input type="file" id="audioInput" name="audio" accept="audio/*">

        <div class="upload-section">
            <div class="icon-box" onclick="document.getElementById('imageInput').click()">🖼 Set Cover Image</div>
        </div>
        <div id="imageStatus" class="file-status"></div>
        <input type="file" id="imageInput" name="image" accept=".jpg,.jpeg,.png">

        <button type="submit" id="submitBtn">Post to Feed</button>
    </form>
</div>

<script>
const textarea = document.getElementById('title');
const counter = document.getElementById('counter');
const audioInput = document.getElementById('audioInput');
const imageInput = document.getElementById('imageInput');
const postForm = document.getElementById('postForm');
const submitBtn = document.getElementById('submitBtn');
const jsError = document.getElementById('jsError');
const recordBtn = document.getElementById('recordBtn');
const audioStatus = document.getElementById('audioStatus');

let mediaRecorder;
let chunks = [];
let isRecording = false;
let maxTimer;
let stream;

// 1. Word counter logic
textarea.addEventListener('input', () => {
    const words = textarea.value.trim().split(/\s+/).filter(w => w);
    counter.textContent = `${words.length} / 350 words`;
});

// 2. File Status Logic
imageInput.addEventListener('change', function () {
    if (this.files[0]) {
        document.getElementById('imageStatus').style.display = 'block';
        document.getElementById('imageStatus').innerText = "📸 " + this.files[0].name;
    }
});

audioInput.addEventListener('change', function () {
    if (this.files[0]) {
        audioStatus.style.display = 'block';
        audioStatus.innerText = "🎵 " + this.files[0].name;
        if (isRecording) stopMediaRecorder(); 
    }
});

// 3. Audio Recording Implementation
async function toggleRecording() {
    if (!isRecording) {
        startRecording();
    } else {
        stopMediaRecorder();
    }
}

async function startRecording() {
    try {
        chunks = [];
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Detect supported MIME types for cross-browser support
        const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg';
        
        mediaRecorder = new MediaRecorder(stream, { mimeType });

        mediaRecorder.ondataavailable = e => {
            if (e.data.size > 0) chunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: mimeType });
            const extension = mimeType.split('/')[1];
            const file = new File([blob], `voice_note_${Date.now()}.${extension}`, { type: mimeType });
            
            // Transfer recorded file to the hidden input
            const dt = new DataTransfer();
            dt.items.add(file);
            audioInput.files = dt.files;

            audioStatus.style.display = 'block';
            audioStatus.innerText = "✅ Voice note ready (" + (blob.size / 1024).toFixed(1) + " KB)";
            
            // Cleanup stream
            stream.getTracks().forEach(track => track.stop());
        };

        mediaRecorder.start();
        isRecording = true;
        
        recordBtn.innerText = "🛑 Stop (Max 8:00)";
        recordBtn.classList.add('recording-active');

        maxTimer = setTimeout(() => {
            if (isRecording) stopMediaRecorder();
        }, 480000); 

    } catch (err) {
        console.error(err);
        alert("Microphone access denied or not supported.");
    }
}

function stopMediaRecorder() {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
        isRecording = false;
        recordBtn.innerText = "🎤 Record Voice";
        recordBtn.classList.remove('recording-active');
        clearTimeout(maxTimer);
    }
}

// 4. Submission Logic
postForm.addEventListener("submit", async function (e) {
    e.preventDefault();
    jsError.style.display = 'none';

    if (!imageInput.files[0]) {
        alert("A cover image is required.");
        return;
    }

    submitBtn.disabled = true;
    submitBtn.innerText = "Uploading to post...";

    try {
        const formData = new FormData(this);

        // Explicitly ensure the audio file from the hidden input is included
        if (audioInput.files[0]) {
            formData.set('audio', audioInput.files[0]);
        }

        const res = await fetch(window.location.href, {
            method: "POST",
            body: formData,
            headers: {
                "X-CSRFToken": "{{ csrf_token }}",
                "X-Requested-With": "XMLHttpRequest"
            }
        });

        if (res.ok) {
            window.location.href = "{% url 'feed' %}";
        } else {
            const errorData = await res.json();
            throw new Error(errorData.error || "Upload failed.");
        }

    } catch (err) {
        console.error(err);
        jsError.innerText = err.message;
        jsError.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerText = "Post to Feed";
    }
});
</script>
</body>
</html>
