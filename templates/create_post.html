<!DOCTYPE html>
<html lang="en">
  <html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}"></html>  
<head>
<meta charset="UTF-8">
<title>Create Post</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(rgba(0,128,0,0.5), rgba(255,255,255,0.5));
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        width: 90%;
        max-width: 500px;
        padding: 20px;
        border-radius: 20px;
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        animation: fadeIn 0.7s ease;
    }

    h2 {
        text-align: center;
        color: green;
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        border-radius: 15px;
        border: 1px solid green;
        resize: none;
        outline: none;
        margin-bottom: 10px;
    }

    .counter {
        text-align: right;
        font-size: 12px;
        color: green;
        margin-bottom: 10px;
    }

    .upload-section {
        display: flex;
        justify-content: space-between;
        margin: 15px 0;
    }

    .icon-box {
        flex: 1;
        margin: 5px;
        padding: 15px;
        border-radius: 15px;
        border: 1px solid green;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        color: green;
    }

    .icon-box:hover {
        background: green;
        color: white;
        transform: scale(1.05);
    }

    /* Status indicator for hidden inputs */
    .file-status {
        font-size: 11px;
        color: #555;
        text-align: center;
        margin-top: -5px;
        margin-bottom: 10px;
        display: none; /* Shown via JS */
    }

    input[type="file"] {
        display: none;
    }

    button {
        width: 100%;
        padding: 12px;
        border-radius: 20px;
        border: none;
        background: green;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: darkgreen;
        transform: scale(1.05);
    }

    @keyframes fadeIn {
        from {opacity:0; transform: translateY(20px);} 
        to {opacity:1; transform: translateY(0);} 
    }
</style>
</head>
<body>

<div class="container">
    <h2>Create a Post Now</h2>

    <!-- Ensure action points to your view and method is POST -->
    <form action="{% url 'create_post' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <textarea id="title" name="title" placeholder="Write your post (max 350 words)" required></textarea>
        <div class="counter" id="counter">0 / 350</div>

        <!-- AUDIO SECTION -->
        <div class="upload-section">
            <div class="icon-box" onclick="document.getElementById('audioInput').click()">
                📁 Select Audio
            </div>
            <div class="icon-box" onclick="startRecording()">
                🎤 Record Voice
            </div>
        </div>
        <div id="audioStatus" class="file-status">✅ Audio selected</div>
        <input type="file" id="audioInput" name="audio" accept="audio/*">

        <!-- IMAGE SECTION -->
        <div class="upload-section">
            <div class="icon-box" onclick="document.getElementById('imageInput').click()">
                🖼 Select audio story cover
            </div>
        </div>
        <div id="imageStatus" class="file-status">✅ Image selected</div>
        <input type="file" id="imageInput" name="image" accept="image/*" required>

        <button type="submit">Post</button>
    </form>
</div>

<script>
    const textarea = document.getElementById('title');
    const counter = document.getElementById('counter');
    const audioInput = document.getElementById('audioInput');
    const imageInput = document.getElementById('imageInput');

    // Word counter logic
    textarea.addEventListener('input', () => {
        const words = textarea.value.trim().split(/\s+/).filter(w => w.length > 0);
        if (words.length > 350) {
            textarea.value = words.slice(0, 350).join(' ');
        }
        counter.textContent = words.length + " / 350";
    });

    // Visual feedback when files are selected
    audioInput.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            document.getElementById('audioStatus').style.display = 'block';
            document.getElementById('audioStatus').textContent = "✅ Audio: " + this.files[0].name;
        }
    });

    imageInput.addEventListener('change', function() {
        if (this.files && this.files[0]) {
            document.getElementById('imageStatus').style.display = 'block';
            document.getElementById('imageStatus').textContent = "✅ Image: " + this.files[0].name;
        }
    });

    // Voice Recording logic
    let mediaRecorder;
    let audioChunks = [];

    function startRecording() {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start();
                audioChunks = [];
                
                alert('Recording started (5 seconds)...');

                mediaRecorder.ondataavailable = e => {
                    audioChunks.push(e.data);
                };

                setTimeout(() => {
                    mediaRecorder.stop();
                    stream.getTracks().forEach(track => track.stop()); // Stop the mic
                }, 5000); 

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mpeg' });
                    const file = new File([audioBlob], "recorded_audio.mp3", {type: 'audio/mpeg'});

                    const container = new DataTransfer();
                    container.items.add(file);
                    audioInput.files = container.files;

                    document.getElementById('audioStatus').style.display = 'block';
                    document.getElementById('audioStatus').textContent = "✅ Voice recorded successfully";
                };
            })
            .catch(() => alert('Microphone access denied or not supported.'));
    }
</script>

</body>
</html>
