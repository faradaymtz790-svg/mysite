<!DOCTYPE html>
<html lang="en">
  <html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}"></html>  
<head>
<meta charset="UTF-8">
<title>Create Post</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(rgba(0,128,0,0.5), rgba(255,255,255,0.5));
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        width: 90%;
        max-width: 500px;
        padding: 20px;
        border-radius: 20px;
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        animation: fadeIn 0.7s ease;
    }

    h2 {
        text-align: center;
        color: green;
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        border-radius: 15px;
        border: 1px solid green;
        resize: none;
        outline: none;
        margin-bottom: 10px;
    }

    .counter {
        text-align: right;
        font-size: 12px;
        color: green;
        margin-bottom: 10px;
    }

    .upload-section {
        display: flex;
        justify-content: space-between;
        margin: 15px 0;
    }

    .icon-box {
        flex: 1;
        margin: 5px;
        padding: 15px;
        border-radius: 15px;
        border: 1px solid green;
        text-align: center;
        cursor: pointer;
        transition: 0.3s;
        color: green;
    }

    .icon-box:hover {
        background: green;
        color: white;
        transform: scale(1.05);
    }

    input[type="file"] {
        display: none;
    }

    button {
        width: 100%;
        padding: 12px;
        border-radius: 20px;
        border: none;
        background: green;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: darkgreen;
        transform: scale(1.05);
    }

    @keyframes fadeIn {
        from {opacity:0; transform: translateY(20px);} 
        to {opacity:1; transform: translateY(0);} 
    }
</style>
</head>
<body>

<div class="container">
    <h2>Create a Post Now</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <textarea id="title" name="title" placeholder="Write your post (max 350 words)"></textarea>
        <div class="counter" id="counter">0 / 350</div>

        <!-- AUDIO -->
        <div class="upload-section">
            <div class="icon-box" onclick="document.getElementById('audioInput').click()">
                📁 Select Audio
            </div>
            <div class="icon-box" onclick="startRecording()">
                🎤 Record Voice
            </div>
        </div>

        <input type="file" id="audioInput" name="audio" accept="audio/*">

        <!-- IMAGE -->
        <div class="upload-section">
            <div class="icon-box" onclick="document.getElementById('imageInput').click()">
                🖼 Select audio story cover
            </div>
        </div>

        <input type="file" id="imageInput" name="image" accept="image/*">
    <a href="{% url 'create_post' %}"></a>
        <button type="submit">Post</button>
    </form>
</div>

<script>
    const textarea = document.getElementById('title');
    const counter = document.getElementById('counter');

    textarea.addEventListener('input', () => {
        const words = textarea.value.split(/\s+/).filter(w => w.length > 0);
        if (words.length > 350) {
            textarea.value = words.slice(0, 350).join(' ');
        }
        counter.textContent = words.length + " / 350";
    });

    // Voice Recording (basic)
    let mediaRecorder;
    let audioChunks = [];

    function startRecording() {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.start();
                audioChunks = [];

                mediaRecorder.ondataavailable = e => {
                    audioChunks.push(e.data);
                };

                setTimeout(() => {
                    mediaRecorder.stop();
                }, 5000); // 5 seconds recording

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                    const file = new File([audioBlob], "recorded.mp3");

                    const container = new DataTransfer();
                    container.items.add(file);
                    document.getElementById('audioInput').files = container.files;

                    alert('Voice recorded successfully');
                };
            })
            .catch(() => alert('Microphone access denied'));
    }
</script>

</body>
</html>
