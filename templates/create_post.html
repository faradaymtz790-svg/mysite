<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
<meta charset="UTF-8">
<title>Create Post</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(rgba(0,128,0,0.5), rgba(255,255,255,0.5));
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .container {
        width: 95%;
        max-width: 500px;
        padding: 25px;
        border-radius: 20px;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(15px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        animation: fadeIn 0.7s ease;
    }

    h2 {
        text-align: center;
        color: #2d5a27;
        margin-top: 0;
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 12px;
        border-radius: 15px;
        border: 2px solid #a8cba4;
        resize: none;
        outline: none;
        font-size: 16px;
        box-sizing: border-box;
    }

    .counter {
        text-align: right;
        font-size: 12px;
        color: green;
        margin-top: 5px;
    }

    .upload-section {
        display: flex;
        gap: 10px;
        margin: 15px 0;
    }

    .icon-box {
        flex: 1;
        padding: 15px 10px;
        border-radius: 12px;
        border: 2px dashed green;
        text-align: center;
        cursor: pointer;
        color: green;
        font-weight: bold;
        background: rgba(255,255,255,0.5);
    }

    .icon-box:hover {
        background: green;
        color: white;
    }

    .file-status {
        font-size: 13px;
        color: #2d5a27;
        text-align: center;
        margin: 10px 0;
        display: none;
        padding: 5px;
        background: #e8f5e9;
        border-radius: 8px;
    }

    input[type="file"] {
        display: none;
    }

    #submitBtn {
        width: 100%;
        padding: 15px;
        border-radius: 25px;
        border: none;
        background: green;
        color: white;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
    }

    #submitBtn:disabled {
        background: #a8cba4;
        cursor: not-allowed;
    }

    .error-msg {
        background: #ffebee;
        color: #c62828;
        padding: 10px;
        border-radius: 10px;
        margin-bottom: 15px;
    }

    @keyframes fadeIn {
        from {opacity:0; transform: translateY(20px);}
        to {opacity:1; transform: translateY(0);}
    }
</style>
</head>

<body>

<div class="container">
    <h2>Create Post</h2>

    {% if error %}
        <div class="error-msg">
            {{ error }}
        </div>
    {% endif %}

    <!-- FIXED: Added id="postForm" -->
    <form id="postForm" method="POST" action="/create_post/" enctype="multipart/form-data">
        {% csrf_token %}

        <textarea id="title" name="title" placeholder="Describe your story..." required></textarea>
        <div class="counter" id="counter">0 / 350 words</div>

        <!-- AUDIO -->
        <div class="upload-section">
            <div class="icon-box" onclick="document.getElementById('audioInput').click()">📁 Select Audio</div>
            <div class="icon-box" id="recordBtn" onclick="startRecording()">🎤 Record 5s</div>
        </div>
        <div id="audioStatus" class="file-status"></div>
        <input type="file" id="audioInput" name="audio" accept="audio/*,video/mp4,video/webm">

        <!-- IMAGE -->
        <div class="upload-section">
            <div class="icon-box" onclick="document.getElementById('imageInput').click()">🖼 Set Cover Image</div>
        </div>
        <div id="imageStatus" class="file-status"></div>
        <!-- FIXED: Added name="image" -->
        <input type="file" id="imageInput" name="image" accept=".jpg,.jpeg,.png">

        <button type="submit" id="submitBtn">Post to Feed</button>
    </form>
</div>

<script>
const textarea = document.getElementById('title');
const counter = document.getElementById('counter');
const audioInput = document.getElementById('audioInput');
const imageInput = document.getElementById('imageInput');
const postForm = document.getElementById('postForm');
const submitBtn = document.getElementById('submitBtn');

/* ---------------- WORD COUNTER ---------------- */
textarea.addEventListener('input', () => {
    const words = textarea.value.trim().split(/\s+/).filter(w => w);
    counter.textContent = `${words.length} / 350 words`;
});

/* ---------------- AUDIO UI ---------------- */
audioInput.addEventListener('change', function () {
    if (this.files[0]) {
        document.getElementById('audioStatus').style.display = 'block';
        document.getElementById('audioStatus').innerText = "🎵 " + this.files[0].name;
    }
});

/* ---------------- IMAGE UI ---------------- */
imageInput.addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;

    if (file.size === 0) {
        alert("Invalid image");
        this.value = "";
        return;
    }

    document.getElementById('imageStatus').style.display = 'block';
    document.getElementById('imageStatus').innerText = "📸 " + file.name;
});

/* ---------------- RECORDING ---------------- */
let mediaRecorder;
let chunks = [];

function startRecording() {
    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.start();
        chunks = [];

        document.getElementById('recordBtn').innerText = "Recording...";

        setTimeout(() => mediaRecorder.stop(), 5000);

        mediaRecorder.ondataavailable = e => chunks.push(e.data);

        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: "audio/webm" });
            const file = new File([blob], "voice.webm", { type: blob.type });

            const dt = new DataTransfer();
            dt.items.add(file);
            audioInput.files = dt.files;

            document.getElementById('recordBtn').innerText = "🎤 Record 5s";
            document.getElementById('audioStatus').style.display = 'block';
            document.getElementById('audioStatus').innerText = "✅ Voice ready";
        };
    }).catch(err => {
        alert("Microphone access denied or not found.");
    });
}

/* ---------------- FINAL SUBMIT (MATCHED TO DJANGO VIEW) ---------------- */
postForm.addEventListener("submit", async function (e) {
    // We are letting the standard form submission handle it to ensure Django receives request.FILES
    // If you want to use the JavaScript 'fetch' instead, ensure your Django view is set to return JSON.
    
    const file = imageInput.files[0];

    if (!file) {
        e.preventDefault();
        alert("Please select an image");
        return;
    }

    submitBtn.disabled = true;
    submitBtn.innerText = "Processing...";
    
    // The form will now submit naturally to /create_post/ 
    // and Django will catch 'image' and 'audio' in request.FILES.
});

</script>

</body>
</html>
