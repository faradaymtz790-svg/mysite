<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" dir="{% if LANGUAGE_CODE == 'ar' %}rtl{% else %}ltr{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Post | Logsphere</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(0,128,0,0.5), rgba(255,255,255,0.5));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 95%;
            max-width: 500px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
        }

        h2 { text-align: center; color: #2d5a27; margin-top: 0; }

        textarea {
            width: 100%; height: 120px; padding: 12px;
            border-radius: 15px; border: 2px solid #a8cba4;
            resize: none; outline: none; font-size: 16px;
            box-sizing: border-box;
        }

        .counter { text-align: right; font-size: 12px; color: green; margin-top: 5px; }

        .upload-section { display: flex; gap: 10px; margin: 15px 0; }

        .icon-box {
            flex: 1; padding: 15px 10px; border-radius: 12px;
            border: 2px dashed green; text-align: center;
            cursor: pointer; color: green; font-weight: bold;
            background: rgba(255,255,255,0.5); transition: 0.3s;
        }

        .icon-box:hover { background: green; color: white; }

        .file-status {
            font-size: 13px; color: #2d5a27; text-align: center;
            margin: 10px 0; display: none; padding: 8px;
            background: #e8f5e9; border-radius: 8px;
        }

        input[type="file"] { display: none; }

        #submitBtn {
            width: 100%; padding: 15px; border-radius: 25px;
            border: none; background: green; color: white;
            font-size: 18px; font-weight: bold; cursor: pointer;
        }

        #submitBtn:disabled { background: #a8cba4; cursor: not-allowed; }

        .error-msg {
            background: #ffebee; color: #c62828;
            padding: 10px; border-radius: 10px; margin-bottom: 15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Create Post</h2>

    <div id="jsError" class="error-msg" style="display:none;"></div>

    {% if error %}
        <div class="error-msg">{{ error }}</div>
    {% endif %}

    <!-- Added enctype for file handling -->
    <form id="postForm" method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <textarea id="title" name="title" placeholder="Describe your story..." required></textarea>
        <div class="counter" id="counter">0 / 350 words</div>

        <!-- AUDIO SECTION -->
        <div class="upload-section">
            <div class="icon-box" onclick="document.getElementById('audioInput').click()">📁 Select Audio</div>
            <div class="icon-box" id="recordBtn" onclick="startRecording()">🎤 Record 5s</div>
        </div>
        <div id="audioStatus" class="file-status"></div>
        <!-- Added name="audio" for Django -->
        <input type="file" id="audioInput" name="audio" accept="audio/*">

        <!-- IMAGE SECTION -->
        <div class="upload-section">
            <div class="icon-box" onclick="document.getElementById('imageInput').click()">🖼 Set Cover Image</div>
        </div>
        <div id="imageStatus" class="file-status"></div>
        <!-- Added name="image" for Django -->
        <input type="file" id="imageInput" name="image" accept=".jpg,.jpeg,.png">

        <button type="submit" id="submitBtn">Post to Feed</button>
    </form>
</div>

<script>
const textarea = document.getElementById('title');
const counter = document.getElementById('counter');
const audioInput = document.getElementById('audioInput');
const imageInput = document.getElementById('imageInput');
const postForm = document.getElementById('postForm');
const submitBtn = document.getElementById('submitBtn');
const jsError = document.getElementById('jsError');

// Word counter
textarea.addEventListener('input', () => {
    const words = textarea.value.trim().split(/\s+/).filter(w => w);
    counter.textContent = `${words.length} / 350 words`;
});

// UI Updates
imageInput.addEventListener('change', function () {
    if (this.files[0]) {
        document.getElementById('imageStatus').style.display = 'block';
        document.getElementById('imageStatus').innerText = "📸 " + this.files[0].name;
    }
});

audioInput.addEventListener('change', function () {
    if (this.files[0]) {
        document.getElementById('audioStatus').style.display = 'block';
        document.getElementById('audioStatus').innerText = "🎵 " + this.files[0].name;
    }
});

/* ---------------- AUDIO RECORDING ---------------- */
let mediaRecorder;
let chunks = [];

async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.start();
        chunks = [];
        document.getElementById('recordBtn').innerText = "Recording...";
        
        setTimeout(() => mediaRecorder.stop(), 5000);

        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: "audio/webm" });
            const file = new File([blob], "voice.webm", { type: "audio/webm" });
            const dt = new DataTransfer();
            dt.items.add(file);
            audioInput.files = dt.files;
            document.getElementById('recordBtn').innerText = "🎤 Record 5s";
            document.getElementById('audioStatus').style.display = 'block';
            document.getElementById('audioStatus').innerText = "✅ Voice note recorded";
        };
    } catch (err) {
        alert("Microphone access denied or not available.");
    }
}

/* ---------------- FORM SUBMISSION ---------------- */
postForm.addEventListener("submit", async function (e) {
    e.preventDefault();
    jsError.style.display = 'none';

    if (!imageInput.files[0]) {
        alert("A cover image is required.");
        return;
    }

    submitBtn.disabled = true;
    submitBtn.innerText = "Processing & Uploading...";

    try {
        // We use FormData to wrap the entire form, including files
        const formData = new FormData(postForm);

        const res = await fetch("{% url 'create_post' %}", {
            method: "POST",
            body: formData,
            headers: {
                "X-CSRFToken": "{{ csrf_token }}",
                "X-Requested-With": "XMLHttpRequest"
            }
        });

        if (res.ok) {
            window.location.href = "{% url 'feed' %}";
        } else {
            const errorData = await res.json();
            throw new Error(errorData.error || "Server error occurred.");
        }

    } catch (err) {
        console.error(err);
        jsError.innerText = err.message;
        jsError.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.innerText = "Post to Feed";
    }
});
</script>
</body>
</html>
