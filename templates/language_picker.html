{% load i18n %}

<div class="lang-selector-card">
    <p class="select-label">{% trans "Choose your language" %}</p>
    
    <form action="{% url 'set_language' %}" method="post" id="lang-form">
        {% csrf_token %}
    <input name="next" type="hidden" value="{{ request.path }}">
        
        <div class="custom-select-container">
            <select name="language" class="green-select" onchange="this.form.submit()">
                {% get_current_language as LANGUAGE_CODE %}
                {% get_available_languages as LANGUAGES %}
                
                {% for lang_code, lang_name in LANGUAGES %}
                    <option value="{{ lang_code }}" {% if lang_code == LANGUAGE_CODE %}selected{% endif %}>
                        {{ lang_name }}
                    </option>
                {% endfor %}
            </select>
            <span class="select-arrow"></span>
        </div>

        <button type="submit" class="submit-lang-btn">
            {% trans "Save & Continue" %}
        </button>
    </form>
</div>

<style>
    .lang-selector-card {
        background: #fff;
        width: 80%;
        max-width: 450px;
        padding: 30px 20px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        margin: 0 auto; /* Keep centered */
    }
    .select-label {
        font-family: 'Inter', sans-serif;
        color: #6b7280;
        margin-bottom: 20px;
        font-size: 0.9rem;
    }
    .custom-select-container {
        position: relative;
        width: 100%;
        margin-bottom: 20px;
    }
    .green-select {
        appearance: none;
        width: 100%;
        padding: 15px;
        text-align-last: center;
        font-size: 1rem;
        color: #1f2937;
        background-color: #f9fafb;
        border: 2px solid #e5e7eb;
        border-radius: 12px;
        cursor: pointer;
        outline: none;
    }
    .submit-lang-btn {
        width: 100%;
        padding: 20px;
        font-size: 1rem;
        font-weight: 600;
        color: white;
        background-color: #00a86b;
        border: none;
        border-radius: 12px;
        cursor: pointer;
    }
    .select-arrow {
        position: absolute;
        top: 50%;
        right: 20px;
        transform: translateY(-50%);
        border-top: 6px solid #00a86b;
        border-left: 5px solid transparent;
        border-right: 5px solid transparent;
    }
</style>
