<!-- =========================================================================
     RADIO NETWORKS INVITATION ENGINE (STITCH & APPEND CAPABILITY)
     ========================================================================= -->

<style>
    /* 1. System Placement & Floating Dock */
    .radio-invitation-dock {
        position: fixed;
        bottom: 32px;
        right: 32px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 16px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* 2. Interactive Pulsing Studio Microphone Trigger Icon */
    .radio-mic-pulse-trigger {
        width: 64px;
        height: 64px;
        background: radial-gradient(circle, #00c47d 0%, var(--primary-green, #00a86b) 100%);
        color: #ffffff;
        border: none;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
        cursor: pointer;
        position: relative;
        box-shadow: 0 0 0 0 rgba(0, 168, 107, 0.6), 0 10px 25px rgba(0, 168, 107, 0.3);
        animation: networkEmeraldPulse 2s infinite cubic-bezier(0.66, 0, 0, 1);
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .radio-mic-pulse-trigger:hover {
        transform: scale(1.08);
    }

    @keyframes networkEmeraldPulse {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 168, 107, 0.5), 0 10px 25px rgba(0, 168, 107, 0.3); }
        70% { box-shadow: 0 0 0 20px rgba(0, 168, 107, 0), 0 10px 25px rgba(0, 168, 107, 0.3); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 168, 107, 0), 0 10px 25px rgba(0, 168, 107, 0.3); }
    }

    .radio-badge-alert {
        position: absolute;
        top: -2px;
        right: -2px;
        background-color: #ef4444;
        color: #ffffff;
        font-size: 0.75rem;
        font-weight: 800;
        padding: 4px 8px;
        border-radius: 12px;
        border: 2px solid #ffffff;
    }

    /* 3. Glassmorphic Modal Framework */
    .radio-glass-card-flyout {
        display: none;
        width: 350px;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(226, 232, 240, 0.8);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 12px 40px rgba(15, 23, 42, 0.12);
        animation: radioFlyoutIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes radioFlyoutIn {
        from { opacity: 0; transform: translateY(24px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .radio-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
        border-bottom: 1px solid rgba(226, 232, 240, 0.6);
        padding-bottom: 10px;
    }

    .radio-card-header h4 {
        font-size: 1rem;
        font-weight: 800;
        margin: 0;
        color: var(--text-dark, #0f172a);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .radio-network-meta-tag {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--primary-green, #00a86b);
        background: rgba(0, 168, 107, 0.1);
        padding: 4px 8px;
        border-radius: 6px;
    }

    .radio-card-body {
        font-size: 0.88rem;
        line-height: 1.5;
        color: #475569;
        margin-bottom: 18px;
    }

    /* Channel Identity Data Matrix */
    .network-identity-block {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 10px 12px;
        margin: 12px 0;
        font-size: 0.8rem;
    }

    .identity-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 4px;
    }
    .identity-row:last-child { margin-bottom: 0; }
    .identity-row span.label { color: #64748b; font-weight: 500; }
    .identity-row span.value { color: #0f172a; font-weight: 700; }

    /* Asynchronous Audio Architecture Elements */
    .radio-audio-module {
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 14px;
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .audio-interface-row {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .radio-control-circle {
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 1rem;
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        transition: background 0.2s;
    }

    .radio-control-circle:hover { background: #e2e8f0; }

    .radio-scrubber-track {
        flex: 1;
        height: 6px;
        background: #cbd5e1;
        border-radius: 3px;
        position: relative;
        overflow: hidden;
    }

    .radio-scrubber-fill {
        width: 0%;
        height: 100%;
        background: var(--primary-green, #00a86b);
    }

    /* 4. Action Matrices buttons */
    .radio-action-layout {
        display: flex;
        gap: 12px;
    }

    .radio-action-layout button {
        flex: 1;
        padding: 12px;
        font-size: 0.85rem;
        font-weight: 700;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-radio-confirm {
        background-color: var(--primary-green, #00a86b);
        color: #ffffff;
    }

    .btn-radio-confirm:hover {
        background-color: var(--dark-green, #008756);
        transform: translateY(-1px);
    }

    .btn-radio-cancel {
        background-color: #fee2e2;
        color: #ef4444;
    }

    .btn-radio-cancel:hover {
        background-color: #fca5a5;
    }
</style>

<!-- Component Architecture Markup Frame Container -->
<div class="radio-invitation-dock" id="radioInvitationNetworkHub">
    
    <!-- Collapsible Glass Flyout Panel Box -->
    <div class="radio-glass-card-flyout" id="radioInvitePanelBox">
        <div class="radio-card-header">
            <h4 id="radioSystemTitle">Network Node Allocation</h4>
            <span class="radio-network-meta-tag" id="radioLifespanTimer">05:00:00</span>
        </div>
        
        <div class="radio-card-body" id="radioSystemOutputContent">
            <p id="radioCoreMessagePrompt">Processing encryption token keys...</p>
            
            <!-- Network System Parameters Descriptor Panel Matrix -->
            <div class="network-identity-block">
                <div class="identity-row">
                    <span class="label">Channel:</span>
                    <span class="value" id="metaChannelName">--</span>
                </div>
                <div class="identity-row">
                    <span class="label">Frequency:</span>
                    <span class="value" id="metaChannelFrequency">--.9 MHz</span>
                </div>
            </div>

            <!-- Mount Node Slot For Async Audio Stitch Tools Container -->
            <div id="asyncStitchToolbox" style="display: none;"></div>
        </div>
        
        <div class="radio-action-layout" id="radioInteractiveButtonsMatrix">
            <button type="button" class="btn-radio-cancel" onclick="handleNetworkInviteResolution(false)">Decline</button>
            <button type="button" class="btn-radio-confirm" id="radioPrimaryActionButton" onclick="handleNetworkInviteResolution(true)">Accept</button>
        </div>
    </div>

    <!-- Main Floating Pulsating Microphone Button Trigger Node -->
    <button type="button" class="radio-mic-pulse-trigger" id="radioMicTriggerPulseBtn" onclick="toggleRadioCardWindowPanel()">
        <span style="font-style: normal; display: flex; align-items: center; justify-content: center;">🎙️</span>
        <span class="radio-badge-alert" id="radioHubNotificationBadge">1</span>
    </button>

</div>

<script>
    // =========================================================================
    // PRODUCTION CONTROLLER FOR RADIO NETWORKS INVITATION PIPELINES
    // =========================================================================

    // 1. Explicit Radio Network Node System Parameters Array Maps
    const RADIO_NETWORK_DATA = {
        channelName: "Infinite Horizon Audio",
        frequency: "104.2",
        podcastLink: "https://actions.google.com/sounds/v1/ambiences/morning_birds.ogg", // Core audio tracking master resource target file
        lifespanSeconds: 5 * 60 * 60 // 5-Hour Operational Timeline window
    };

    // System Variable Check Flag: Tells the layout if the original live conversation session has closed
    // Toggle false to launch historical content playback & recording iteration chains automatically
    let isRadioSessionLive = false; 
    
    let networkTimerCountdownInterval;

    document.addEventListener("DOMContentLoaded", () => {
        populateRadioTemplateMetadata();
        initializeRadioInvitationLifespanClock();
        evaluateRadioNetworkInterfaceMode();
    });

    /** Synchronizes template tags directly with targeted architecture structures */
    function populateRadioTemplateMetadata() {
        document.getElementById('metaChannelName').textContent = RADIO_NETWORK_DATA.channelName;
        document.getElementById('metaChannelFrequency').textContent = `${RADIO_NETWORK_DATA.frequency} MHz`;
    }

    /** Switches between hot mic links and asynchronous recording append overlays */
    function evaluateRadioNetworkInterfaceMode() {
        const title = document.getElementById('radioSystemTitle');
        const prompt = document.getElementById('radioCoreMessagePrompt');
        const primaryBtn = document.getElementById('radioPrimaryActionButton');

        if (isRadioSessionLive) {
            title.textContent = "Live Stream Allocation";
            prompt.textContent = "You've been added to the mic network roster as an active stream provider. Accept to launch live audio mix feeds.";
            primaryBtn.textContent = "Go Live On Net";
        } else {
            title.textContent = "Append Voice Session";
            prompt.textContent = "The original live transmission window has ended. Review the master record conversation stream below and add your commentary to append, compile, and re-publish the updated podcast file across the network directory indexing servers.";
            primaryBtn.textContent = "Review & Append";
        }
    }

    function initializeRadioInvitationLifespanClock() {
        let timestampAnchor = localStorage.getItem('radio_invitation_epoch_timestamp');
        if (!timestampAnchor) {
            timestampAnchor = Date.now();
            localStorage.setItem('radio_invitation_epoch_timestamp', timestampAnchor);
        }

        const elapsedSeconds = Math.floor((Date.now() - parseInt(timestampAnchor)) / 1000);
        const remainingLifespan = RADIO_NETWORK_DATA.lifespanSeconds - elapsedSeconds;

        if (remainingLifespan <= 0) {
            triggerRadioInviteExpirationsSweep();
        } else {
            executeRadioCountdownLoop(remainingLifespan);
        }
    }

    function executeRadioCountdownLoop(duration) {
        let clockSecondsCounter = duration;
        const display = document.getElementById('radioLifespanTimer');
        renderClockDigitOutput(clockSecondsCounter, display);

        networkTimerCountdownInterval = setInterval(() => {
            clockSecondsCounter--;
            renderClockDigitOutput(clockSecondsCounter, display);

            if (clockSecondsCounter <= 0) {
                clearInterval(networkTimerCountdownInterval);
                triggerRadioInviteExpirationsSweep();
            }
        }, 1000);
    }

    function renderClockDigitOutput(totalSeconds, htmlDisplayNode) {
        if (!htmlDisplayNode) return;
        let hrs = Math.floor(totalSeconds / 3600);
        let mins = Math.floor((totalSeconds % 3600) / 60);
        let secs = Math.floor(totalSeconds % 60);
        htmlDisplayNode.textContent = `${hrs < 10 ? "0"+hrs : hrs}:${mins < 10 ? "0"+mins : mins}:${secs < 10 ? "0"+secs : secs}`;
    }

    function toggleRadioCardWindowPanel() {
        const panel = document.getElementById('radioInvitePanelBox');
        if (!panel) return;
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    /** Resolves confirmation parameters and splits workflows based on current status metrics */
    function handleNetworkInviteResolution(isConfirmed) {
        if (!isConfirmed) {
            document.getElementById('radioSystemOutputContent').innerHTML = `<p style="color: #ef4444; font-weight:700; margin:0;">✕ System Invitation Declined.</p>`;
            document.getElementById('radioInteractiveButtonsMatrix').style.display = 'none';
            setTimeout(wipeRadioSystemElementsFromCanvas, 1500);
            return;
        }

        if (isRadioSessionLive) {
            // Flow A: Action loops connecting stream lines to ongoing media channels
            document.getElementById('radioInteractiveButtonsMatrix').style.display = 'none';
            document.getElementById('radioSystemOutputContent').innerHTML = `<p style="color: #00a86b; font-weight:700; margin:0;">✓ Patching connection vectors directly into live studio matrix arrays...</p>`;
            bootstrapLiveHardwareMediaStreamingHandshake();
        } else {
            // Flow B: Late accept. Append loop sequence engine instantiation
            launchAsynchronousStitchWorkspace();
        }
    }

    /** Injects non-destructive audio playback modules and recording append nodes into layout canvas */
    function launchAsynchronousStitchWorkspace() {
        document.getElementById('radioInteractiveButtonsMatrix').style.display = 'none';
        document.getElementById('radioCoreMessagePrompt').style.display = 'none';
        
        const toolbox = document.getElementById('asyncStitchToolbox');
        toolbox.style.display = 'block';
        
        toolbox.innerHTML = `
            <div class="radio-audio-module">
                <span style="font-size:0.75rem; font-weight:800; color:#475569; text-transform:uppercase;">1. Playback Context Record Stream</span>
                <div class="audio-interface-row">
                    <button type="button" class="radio-control-circle" id="radioPlaybackControlNodeBtn" onclick="toggleNetworkAudioPlaybackTrack()">▶</button>
                    <div class="radio-scrubber-track"><div class="radio-scrubber-fill" id="radioTimelineScrubberProgressFill"></div></div>
                </div>
                <audio id="radioCoreAudioNodeTarget" src="${RADIO_NETWORK_DATA.podcastLink}" ontimeupdate="synchronizeRadioScrubberUIFillLine()" onended="restorePlaybackButtonUIState()"></audio>
            </div>

            <div class="radio-audio-module" id="radioMicRecordingWorkspaceBlock" style="display:none;">
                <span style="font-size:0.75rem; font-weight:800; color:#475569; text-transform:uppercase;">2. Record Thoughts & Append Layers</span>
                <button type="button" class="btn-radio-confirm" id="radioMediaRecordingControlBtn" style="padding:12px; width:100%; display:flex; align-items:center; justify-content:center; gap:8px;" onclick="toggleRadioVoiceCapturePipeline()">
                    🎙️ Capture Audio Overlay
                </button>
                <span id="radioVoiceStatusLabel" style="font-size:0.75rem; text-align:center; color:#64748b; font-weight:600; margin-top:4px;"></span>
            </div>
        `;
    }

    function toggleNetworkAudioPlaybackTrack() {
        const track = document.getElementById('radioCoreAudioNodeTarget');
        const btn = document.getElementById('radioPlaybackControlNodeBtn');
        const recordingBlock = document.getElementById('radioMicRecordingWorkspaceBlock');
        
        if (track.paused) {
            track.play();
            btn.textContent = "⏸";
            recordingBlock.style.display = 'block'; // Make recording tools available as soon as playback starts
        } else {
            track.pause();
            btn.textContent = "▶";
        }
    }

    function synchronizeRadioScrubberUIFillLine() {
        const track = document.getElementById('radioCoreAudioNodeTarget');
        const fill = document.getElementById('radioTimelineScrubberProgressFill');
        if (track.duration) {
            const percentageFilled = (track.currentTime / track.duration) * 100;
            fill.style.width = percentageFilled + "%";
        }
    }

    function restorePlaybackButtonUIState() {
        document.getElementById('radioPlaybackControlNodeBtn').textContent = "▶";
        document.getElementById('radioTimelineScrubberProgressFill').style.width = "0%";
    }

    let isRadioRecordingActive = false;
    function toggleRadioVoiceCapturePipeline() {
        const btn = document.getElementById('radioMediaRecordingControlBtn');
        const informationalLabel = document.getElementById('radioVoiceStatusLabel');
        
        if (!isRadioRecordingActive) {
            isRadioRecordingActive = true;
            btn.textContent = "⏹ Complete Track Append";
            btn.style.backgroundColor = "#ef4444";
            informationalLabel.textContent = "Recording stream commentary layer active. Historical audio track matches preserved securely.";
            console.log("MediaRecorder initialization hook established on user microphone pipeline hardware driver arrays.");
        } else {
            isRadioRecordingActive = false;
            btn.style.display = "none";
            informationalLabel.innerHTML = `⏳ Compiling timeline layers and appending updates to live podcast file...`;
            
            // Simulating internal binary file compilation and network storage pushes
            setTimeout(() => {
                document.getElementById('asyncStitchToolbox').innerHTML = `
                    <div style="text-align:center; padding:8px 0;">
                        <p style="color:#00a86b; font-weight:800; margin:0 0 4px 0; font-size:0.95rem;">✨ Broadcast Track Updated!</p>
                        <p style="font-size:0.8rem; color:#64748b; margin:0;">Your feedback voice segment was stitched cleanly onto the master file timeline. The updated audio track has been compiled and re-posted to your network stream list.</p>
                    </div>
                `;
                
                // Remove the notification bubble indicator immediately
                const badge = document.getElementById('radioHubNotificationBadge');
                if (badge) badge.style.display = 'none';
                
                setTimeout(wipeRadioSystemElementsFromCanvas, 4500);
            }, 2500);
        }
    }

    function bootstrapLiveHardwareMediaStreamingHandshake() {
        console.log("Broadcasting live execution payload parameters back to active radio network routers.");
    }

    function triggerRadioInviteExpirationsSweep() {
        console.log("Invitation lifespans window breached. Commencing elements sweep routine.");
        wipeRadioSystemElementsFromCanvas();
    }

    function wipeRadioSystemElementsFromCanvas() {
        const interfaceHub = document.getElementById('radioInvitationNetworkHub');
        if (interfaceHub) {
            interfaceHub.style.transition = 'opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
            interfaceHub.style.opacity = '0';
            interfaceHub.style.transform = 'translateY(32px)';
            setTimeout(() => {
                interfaceHub.remove();
                localStorage.removeItem('radio_invitation_epoch_timestamp');
            }, 600);
        }
    }
</script>
