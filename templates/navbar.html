{% load static %}

<style>
    /* Import Signature Font */
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

    /* 🌿 STACKED GLASS NAVBAR */
    .navbar-container {
        display: flex;
        flex-direction: column; 
        align-items: center;
        width: 100%;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        position: sticky;
        top: 0;
        z-index: 1000;
        padding: 8px 0 0 0; 
    }

    /* 1. TOP SECTION: Logo (Left), Search (Center), Settings (Right) */
    .nav-top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 95%; 
        max-width: 1200px;
        margin-bottom: 5px;
    }

    .nav-logo {
        font-family: 'Great Vibes', cursive;
        font-size: 32px; 
        font-weight: 400;
        color: #00a86b;
        text-decoration: none;
        text-transform: capitalize; 
        flex: 1; 
        line-height: 1;
        white-space: nowrap;
    }

    .search-wrapper {
        flex: 2; 
        max-width: 600px;
        margin: 0 15px;
    }

    .search-bar {
        display: flex;
        align-items: center;
        background: #f0f2f5;
        border-radius: 25px;
        padding: 8px 18px;
        transition: 0.3s;
    }

    .search-bar:focus-within {
        background: #fff;
        box-shadow: 0 0 0 2px #00a86b;
    }

    .search-bar input {
        border: none;
        background: transparent;
        outline: none;
        width: 100%;
        padding-left: 10px;
        font-size: 14px;
        font-family: "Gill Sans", sans-serif;
    }

    /* Settings Icon Alignment */
    .settings-wrapper {
        flex: 1;
        display: flex;
        justify-content: flex-end;
    }

    .settings-icon-btn {
        text-decoration: none;
        font-size: 22px;
        background: #f0f2f5;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: 0.3s;
    }

    .settings-icon-btn:hover {
        background: #e4e6eb;
        transform: rotate(45deg);
        color: #00a86b;
    }

    /* 2. BOTTOM SECTION: Nav Items */
    .nav-bottom-row {
        display: flex;
        justify-content: center;
        width: 100%;
        max-width: 600px; 
        gap: 10px;
        margin-top: 5px;
    }

    .nav-link {
        text-decoration: none;
        color: #65676b;
        font-size: 26px;
        padding: 10px 0;
        flex: 1; 
        text-align: center;
        transition: 0.3s;
        position: relative;
    }

    /* 🟢 GREEN FOCUS/HOVER */
    .nav-link:hover {
        color: #00a86b;
        background: rgba(0, 168, 107, 0.05);
        border-radius: 8px;
    }

    .nav-link:hover::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: #00a86b;
    }
</style>

<div class="navbar-container">
    <div class="nav-top-row">
        <!-- Logo -->
        <a href="/" class="nav-logo">Plugbar</a>

        <!-- Search Section -->
        <form action="{% url 'search' %}" method="GET" style="position: relative; display: flex; align-items: center; max-width: 400px; width: 100%;">
            <input type="text" 
                   name="q" 
                   placeholder="Search people or posts..." 
                   value="{{ request.GET.q }}"
                   style="width: 100%; padding: 10px 15px 10px 45px; border-radius: 25px; border: 1px solid #ddd; background: #f0f2f5; outline: none; transition: 0.3s; font-family: 'Inter', sans-serif;">

            <div style="position: absolute; left: 15px; display: flex; align-items: center; pointer-events: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #65676b;">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
            <button type="submit" style="display: none;">Search</button>
        </form>

        <!-- Settings Section -->
        <div class="settings-wrapper">
            <a href="{% url 'settings' %}" class="settings-icon-btn" title="Settings">
                ⚙️
            </a>
        </div>
    </div>

    <!-- Navigation Links -->
    <div class="nav-bottom-row">
        {% if request.user.is_authenticated %}
            <a href="{% url 'profile' username=request.user.username %}" class="nav-link" title="PROFILE">🏠</a>
        {% else %}
            <a href="{% url 'account_login' %}" class="nav-link" title="LOGIN">🏠</a>
        {% endif %}

        <a href="{% url 'feed' %}" class="nav-link" title="FEED">🎧</a>
        <a href="{% url 'notifications' %}" class="nav-link" title="ALERTS">🔔</a>
    </div>
</div>
