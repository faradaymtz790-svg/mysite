{% load static %}
{% load i18n %}

<style>
    /* Import Signature Font */
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap');

    /* 🌿 STACKED GLASS NAVBAR */
    .navbar-container {
        display: flex;
        flex-direction: column; 
        align-items: center;
        width: 100%;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        position: sticky;
        top: 0;
        z-index: 1000;
        padding: 8px 0 0 0; 
    }

    .nav-top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 95%; 
        max-width: 1200px;
        margin-bottom: 5px;
    }

    .nav-logo {
        font-family: 'Great Vibes', cursive;
        font-size: 32px; 
        font-weight: 400;
        color: #00a86b;
        text-decoration: none;
        flex: 1; 
        line-height: 1;
    }

    /* 🌎 LANGUAGE SELECTOR STYLING */
    .lang-form-nav {
        margin-right: 12px;
        display: flex;
        align-items: center;
    }

    .nav-lang-select {
        border: none;
        background: #f0f2f5;
        border-radius: 12px;
        padding: 5px 10px;
        font-size: 13px;
        color: #65676b;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        outline: none;
        transition: 0.3s;
    }

    .nav-lang-select:hover {
        background: #e4e6eb;
        color: #00a86b;
    }

    .search-wrapper-form {
        position: relative; 
        display: flex; 
        align-items: center; 
        max-width: 400px; 
        width: 100%;
        flex: 2;
        margin: 0 10px;
    }

    .settings-wrapper {
        flex: 1;
        display: flex;
        justify-content: flex-end;
        align-items: center;
    }

    .settings-icon-btn {
        text-decoration: none;
        font-size: 20px;
        background: #f0f2f5;
        width: 38px;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: 0.3s;
    }

    .nav-bottom-row {
        display: flex;
        justify-content: center;
        width: 100%;
        max-width: 600px; 
        gap: 10px;
        margin-top: 5px;
    }

    .nav-link {
        text-decoration: none;
        color: #65676b;
        font-size: 26px;
        padding: 10px 0;
        flex: 1; 
        text-align: center;
        position: relative;
    }

    .nav-link:hover {
        color: #00a86b;
    }
</style>

<div class="navbar-container">
    <div class="nav-top-row">
        <!-- Logo -->
        <a href="/" class="nav-logo">Plugbar</a>

        <!-- Search Section -->
        <form action="{% url 'search' %}" method="GET" class="search-wrapper-form">
            <input type="text" name="q" placeholder="Search..." value="{{ request.GET.q }}"
                   style="width: 100%; padding: 10px 15px 10px 40px; border-radius: 25px; border: 1px solid #ddd; background: #f0f2f5; outline: none;">
            <div style="position: absolute; left: 12px; color: #65676b;">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </form>

        <!-- Right Side: Language + Settings -->
        <div class="settings-wrapper">
            <!-- Language Picker -->
            <form action="{% url 'set_language' %}" method="post" class="lang-form-nav">
                {% csrf_token %}
                <input name="next" type="hidden" value="{{ request.get_full_path|safe }}">
                <select name="language" onchange="this.form.submit()" class="nav-lang-select">
                    {% get_current_language as LANGUAGE_CODE %}
                    {% get_available_languages as LANGUAGES %}
                    {% for lang_code, lang_name in LANGUAGES %}
                        <option value="{{ lang_code }}" {% if lang_code == LANGUAGE_CODE %}selected{% endif %}>
                            {{ lang_code|upper }}
                        </option>
                    {% endfor %}
                </select>
            </form>

            <a href="{% url 'settings' %}" class="settings-icon-btn">⚙️</a>
        </div>
    </div>

    <!-- Navigation Links -->
    <div class="nav-bottom-row">
        {% if request.user.is_authenticated %}
            <a href="{% url 'profile' username=request.user.username %}" class="nav-link">🏠</a>
        {% else %}
            <a href="{% url 'account_login' %}" class="nav-link">🏠</a>
        {% endif %}
        <a href="{% url 'feed' %}" class="nav-link">🎧</a>
        <a href="{% url 'notifications' %}" class="nav-link">🔔</a>
    </div>
</div>
