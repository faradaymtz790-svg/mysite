{% load static %}
{% load i18n %}

<style>
    @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700&display=swap');

    :root {
        --primary-green: #00a86b;
        --glass-bg: rgba(255, 255, 255, 0.95);
        --soft-gray: #f0f2f5;
        --active-text: #00a86b;
    }

    .navbar-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        position: sticky;
        top: 0;
        z-index: 1000;
        padding: 16px 0 12px 0;
        font-family: 'Inter', sans-serif;
    }

    .nav-top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 92%;
        max-width: 1400px;
        position: relative;
    }

    .nav-logo {
        font-family: 'Great Vibes', cursive;
        font-size: 34px;
        color: var(--primary-green);
        text-decoration: none;
        transition: transform 0.2s, opacity 0.3s;
        z-index: 10;
    }

    .search-wrapper-form {
        position: absolute;
        right: 140px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        width: 40px; 
        height: 40px;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
        border-radius: 50px;
    }

    .search-wrapper-form:focus-within {
        width: 60%; 
        right: 15%; 
        z-index: 100;
    }

    .search-input {
        width: 100%;
        height: 100%;
        padding: 0 20px 0 50px;
        border-radius: 50px;
        border: 2px solid var(--primary-green);
        background: white;
        outline: none;
        font-size: 16px;
        opacity: 0;
        cursor: pointer;
        transition: opacity 0.3s;
    }

    .search-wrapper-form:focus-within .search-input {
        opacity: 1;
        cursor: text;
    }

    .search-icon-trigger {
        position: absolute;
        left: 10px;
        color: #65676b;
        pointer-events: none;
        transition: all 0.3s;
        z-index: 5;
    }

    .search-wrapper-form:focus-within .search-icon-trigger {
        color: var(--primary-green);
        left: 20px;
    }

    .navbar-container:has(.search-input:focus) .nav-logo,
    .navbar-container:has(.search-input:focus) .settings-wrapper {
        opacity: 0;
        pointer-events: none;
    }

    .settings-wrapper {
        display: flex;
        align-items: center;
        gap: 16px;
        z-index: 10;
        transition: opacity 0.3s;
    }

    .nav-lang-select {
        border: none;
        background: var(--soft-gray);
        border-radius: 15px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        outline: none;
    }

    .settings-icon-btn {
        text-decoration: none;
        background: var(--soft-gray);
        width: 42px;
        height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 20px;
        transition: background 0.2s;
    }

    .settings-icon-btn:hover {
        background: #e4e6eb;
    }

    .nav-bottom-row {
        display: flex;
        justify-content: center;
        width: 100%;
        max-width: 600px;
        gap: 50px; /* Adjusted for 4 icons */
        margin-top: 15px;
        padding-bottom: 5px;
    }

    .nav-link {
        text-decoration: none;
        color: #65676b;
        font-size: 24px;
        padding: 8px 12px;
        transition: all 0.2s ease;
        border-radius: 12px;
        position: relative;
    }

    .nav-link:hover, .nav-link.active {
        color: var(--primary-green);
        background: var(--soft-gray);
        transform: translateY(-2px);
    }
</style>

<div class="navbar-container">
    <div class="nav-top-row">
        <a href="/" class="nav-logo">Plugbar</a>

        <form action="{% url 'search' %}" method="GET" class="search-wrapper-form">
            <div class="search-icon-trigger">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
            <input type="text" name="q" class="search-input" placeholder="Search now...!" value="{{ request.GET.q }}">
        </form>

        <div class="settings-wrapper">
            <form action="{% url 'set_language' %}" method="post" class="lang-form-nav">
                {% csrf_token %}
                <input name="next" type="hidden" value="{{ request.get_full_path|safe }}">
                <select name="language" onchange="this.form.submit()" class="nav-lang-select">
                    {% get_current_language as LANGUAGE_CODE %}
                    {% get_available_languages as LANGUAGES %}
                    {% for lang_code, lang_name in LANGUAGES %}
                        <option value="{{ lang_code }}" {% if lang_code == LANGUAGE_CODE %}selected{% endif %}>
                            {{ lang_code|upper }}
                        </option>
                    {% endfor %}
                </select>
            </form>
            <a href="{% url 'settings' %}" class="settings-icon-btn">⚙️</a>
        </div>
    </div>

    <div class="nav-bottom-row">
        {% if request.user.is_authenticated %}
            <a href="{% url 'profile' username=request.user.username %}" class="nav-link {% if request.resolver_match.url_name == 'profile' %}active{% endif %}" title="Home">🏠</a>
        {% else %}
            <a href="{% url 'account_login' %}" class="nav-link" title="Login">🏠</a>
        {% endif %}
        
        <a href="{% url 'feed' %}" class="nav-link {% if request.resolver_match.url_name == 'feed' %}active{% endif %}" title="Feed">🎧</a>
        
        <a href="{% url 'audio_feed' %}" class="nav-link {% if request.resolver_match.url_name == 'audio_feed' %}active{% endif %}" title="Audio Feed">📻</a>
        
        <a href="{% url 'notifications' %}" class="nav-link {% if request.resolver_match.url_name == 'notifications' %}active{% endif %}" title="Notifications">🔔</a>
    </div>
</div>
