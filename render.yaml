services:
  - type: web
    name: mysite-app
    env: python

    buildCommand: |
      cd mysite
      pip install -r ../requirements.txt
      python manage.py collectstatic --noinput

    startCommand: cd mysite && gunicorn mysite.wsgi:application

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mysite-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: mysite-db
    plan: free