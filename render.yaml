services:
  - type: web
    name: mysite-app
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn mysite.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mysite-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: mysite-db
    plan: free